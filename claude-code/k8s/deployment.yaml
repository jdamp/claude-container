apiVersion: apps/v1
kind: Deployment
metadata:
  name: claude-code
  namespace: claude-code
  labels:
    app: claude-code
spec:
  replicas: 1
  strategy:
    type: Recreate # RWO PVCs can only be mounted by one pod
  selector:
    matchLabels:
      app: claude-code
  template:
    metadata:
      labels:
        app: claude-code
    spec:
      automountServiceAccountToken: false
      serviceAccountName: claude-code
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        # --- Claude Code CLI ---
        - name: claude-code
          image: YOUR_REGISTRY/claude-code:latest # TODO: replace with your image
          stdin: true
          tty: true
          env:
            - name: CLAUDE_CONFIG_DIR
              value: /claude
            - name: HTTP_PROXY
              value: http://localhost:3128
            - name: HTTPS_PROXY
              value: http://localhost:3128
            - name: NO_PROXY
              value: localhost,127.0.0.1
            - name: USER_UID
              value: "1000"
            - name: USER_GID
              value: "1000"
          ports:
            - containerPort: 22
              protocol: TCP
          volumeMounts:
            - name: claude-config
              mountPath: /claude
            - name: claude-workspace
              mountPath: /workspace
            - name: ssh-authorized-keys
              mountPath: /etc/ssh/authorized_keys
              subPath: authorized_keys
              readOnly: true
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - NET_RAW
          livenessProbe:
            exec:
              command:
                - pgrep
                - -f
                - claude
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3

        # --- Squid egress proxy ---
        - name: squid
          image: ubuntu/squid:latest
          volumeMounts:
            - name: squid-config
              mountPath: /etc/squid/squid.conf
              subPath: squid.conf
            - name: squid-config
              mountPath: /etc/squid/allowed-domains.txt
              subPath: allowed-domains.txt
          ports:
            - containerPort: 3128
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - NET_RAW
          livenessProbe:
            tcpSocket:
              port: 3128
            initialDelaySeconds: 10
            periodSeconds: 30

      volumes:
        - name: claude-config
          persistentVolumeClaim:
            claimName: claude-config-pvc
        - name: claude-workspace
          persistentVolumeClaim:
            claimName: claude-workspace-pvc
        - name: squid-config
          configMap:
            name: squid-config
        - name: ssh-authorized-keys
          secret:
            secretName: ssh-authorized-keys
            defaultMode: 0440
