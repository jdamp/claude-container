apiVersion: v1
kind: ConfigMap
metadata:
  name: squid-config
  namespace: claude-code
data:
  squid.conf: |
    # Squid forward proxy — domain allowlist for Claude Code
    acl localnet src 127.0.0.0/8

    # SSL bump is not used; we rely on CONNECT tunneling for HTTPS.
    # Only allowlisted domains may be accessed.
    acl allowed_domains dstdomain "/etc/squid/allowed-domains.txt"

    # Allow CONNECT (HTTPS) to standard port
    acl SSL_ports port 443
    acl CONNECT method CONNECT
    http_access deny CONNECT !SSL_ports

    # Allow traffic only to allowlisted domains
    http_access allow localnet allowed_domains
    http_access deny all

    # Listen on localhost only (pod-internal)
    http_port 3128

    # Log to stdout for kubectl logs
    access_log stdio:/dev/stdout
    cache_log stdio:/dev/stderr

    # Minimal cache — this proxy is for filtering, not caching
    cache deny all

  allowed-domains.txt: |
    # Anthropic (required for Claude Code)
    .anthropic.com
    .sentry.io
    .statsig.com

    # Git hosting
    .github.com
    .githubusercontent.com

    # Python packages
    .pypi.org
    .pythonhosted.org

    # Typst packages
    .typst.org

    # Alpine system packages
    .alpinelinux.org

    # npm registry (for claude-code updates)
    .npmjs.org
    .npmjs.com
